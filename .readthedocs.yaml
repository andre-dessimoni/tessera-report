version: 2

build:
  # The base Docker image RTD uses to build the docs. ubuntu-22.04 is the
  # current LTS and the one RTD recommends, it gives access to apt packages if 
  # needed and has a predictable toolchain.
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - full
